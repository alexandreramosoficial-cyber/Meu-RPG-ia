<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>RPG com IA</title>
</head>
<body>

<h1>🎮 RPG com IA</h1>

<div class="status">
  <div>
    ❤️ Vida
    <div class="bar">
      <div id="hpBar" class="hp"></div>
    </div>
  </div>

  <div>
    🎒 Inventário: <span id="inv">Nada</span>
  </div>
</div>

<div id="messages"></div>

<div id="inputArea">
  <input id="input" placeholder="Digite sua ação...">
  <button onclick="enviar()">OK</button>
</div>

<script>
function enviar() {
  let input = document.getElementById("input").value;
  let messages = document.getElementById("messages");
  
  messages.innerHTML += "<p>Você: " + input + "</p>";
}
</script>

</body>
</html>
